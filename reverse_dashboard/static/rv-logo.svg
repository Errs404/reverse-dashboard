<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Reverse Dashboard RV logo</title>
  <desc id="desc">Stylized RV mark with red and blue metallic shield outline.</desc>
  <defs>
    <linearGradient id="red" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6b7a"/>
      <stop offset=".45" stop-color="#ff0022"/>
      <stop offset="1" stop-color="#a80014"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#bfe7ff"/>
      <stop offset=".5" stop-color="#1589ff"/>
      <stop offset="1" stop-color="#003d9c"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".35" stop-color="#d9e0ea"/>
      <stop offset=".68" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9ca8b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-25%" width="140%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.2  0 0.35 0 0 0.15  0 0 1 0 0.8  0 0 0 0.55 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".65"/>
    </filter>
  </defs>
  <rect width="640" height="420" fill="transparent"/>
  <g filter="url(#shadow)">
    <path d="M62 104h248l28 26h282l-74 156 34 88H393l-66 52-68-52H132l-64-64 24-90Z" fill="#05070b"/>
    <path d="M62 104h248l28 26h282l-74 156 34 88H393l-66 52-68-52H132l-64-64 24-90Z" fill="none" stroke="#ecf6ff" stroke-width="10" opacity=".92"/>
    <path d="M62 104h248l28 26h282" fill="none" stroke="url(#red)" stroke-width="18" filter="url(#glow)"/>
    <path d="M338 130h282l-74 156 34 88H393l-66 52" fill="none" stroke="url(#blue)" stroke-width="16" filter="url(#glow)"/>
    <path d="M62 104l30 116-24 90 64 64h127l68 52" fill="none" stroke="url(#red)" stroke-width="14" opacity=".85"/>
  </g>
  <g transform="translate(126 153) skewX(-7)">
    <path d="M0 0h192c54 0 88 29 80 76-7 44-42 70-94 70h-44l88 92h-72l-82-88H58L43 238H-20L8 92h150c20 0 32-9 34-25 2-17-9-27-31-27H23Z" fill="url(#metal)"/>
    <path d="M0 0h192c54 0 88 29 80 76-7 44-42 70-94 70h-44l88 92h-72l-82-88H58L43 238H-20L8 92h150c20 0 32-9 34-25 2-17-9-27-31-27H23Z" fill="none" stroke="#fff" stroke-width="3" opacity=".5"/>
  </g>
  <g transform="translate(365 160) skewX(-8)">
    <path d="M0 18h58l45 134L216 18h58L142 238H80Z" fill="url(#red)"/>
    <path d="M0 18h58l45 134L216 18h58L142 238H80Z" fill="none" stroke="#ff8a98" stroke-width="3" opacity=".55"/>
  </g>
</svg>
